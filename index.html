<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>sign in</title>
    <!--jquery cdn-->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <!-- MDB and Bootstrap 5 -->
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet" />
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css?family=Roboto:300,400,500,700&display=swap" rel="stylesheet" />
    <!-- MDB -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/mdb-ui-kit/7.3.2/mdb.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="css/style.css" />
</head>

<body class="bg-light">
    <section class="gradient-bg vh-100 d-flex justify-content-center align-items-center">
        <!-- sign up -->
        <div class="card">
            <div class="card-body">
                <h4 class="text-center mb-4">Sign Up</h4>
                <form id="registerForm">
                    <input type="email" id="email" class="form-control" placeholder="Email..." /><br>
                    <input type="text" id="name" class="form-control" placeholder="Name..." /><br>
                    <input type="password" id="pass" class="form-control" placeholder="Passeword..." /><br>
                    <button type="submit" class="btn btn-primary ms-2" id="btn">Sign UP</button>
                </form>
                <p id="message"></p>
            </div>
        </div>

        <!-- log in -->
        <div class="card">
            <div class="card-body">
                <h4 class="text-center mb-4">Log In</h4>
                <form id="loginForm">
                    <input type="email" id="emailLogin" class="form-control" placeholder="Email..." /><br>
                    <input type="password" id="passLogin" class="form-control" placeholder="Passeword..." /><br>
                    <button type="submit" class="btn btn-primary ms-2" id="btnLogin">Log In</button>
                </form>
            </div>
    </section>


    </div>


    <!-- MDB and Bootstrap 5 JS -->
    <script type="text/javascript"
        src="https://cdnjs.cloudflare.com/ajax/libs/mdb-ui-kit/7.3.2/mdb.umd.min.js"></script>
    <!-- Custom JavaScript -->
    <script src="js/signup.js"></script>


</body>

</html>
